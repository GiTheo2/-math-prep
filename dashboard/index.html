<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Math Prep</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c1d38;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.09);
    --primary: #3b6cb7;
    --primary-dim: rgba(59,108,183,0.25);
    --text: #f0f4ff;
    --muted: rgba(240,244,255,0.38);
    --mono: 'SF Mono', 'Fira Code', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap { max-width: 440px; margin: 0 auto; padding: 24px 16px 80px; }

  /* Header */
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .logo {
    width: 32px; height: 32px; border-radius: 8px;
    background: #0f2952; border: 1px solid rgba(59,108,183,0.35);
    display: flex; align-items: center; justify-content: center;
    font-style: italic; font-family: Georgia, serif; color: var(--primary);
    font-size: 16px; font-weight: 600;
  }
  .header-label { font-family: var(--mono); font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); }

  /* Cards */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 18px; margin-bottom: 12px;
  }
  .label { font-family: var(--mono); font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: block; }

  /* Week / Phase */
  .week-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .phase-name { font-size: 22px; font-weight: 700; line-height: 1.2; margin: 4px 0; }
  .phase-sub { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .days-logged { text-align: right; }
  .days-num { font-size: 34px; font-weight: 800; color: var(--primary); line-height: 1; }
  .days-sub { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .18em; color: var(--muted); margin-top: 2px; }

  /* Pillars */
  .today-date { margin-bottom: 14px; }
  .pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .pillar-btn {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 16px 8px; border-radius: 16px; border: 1px solid var(--border);
    background: rgba(255,255,255,0.02); cursor: pointer;
    transition: all .18s ease; -webkit-tap-highlight-color: transparent;
    color: var(--muted); font-family: var(--mono); font-size: 10px;
    letter-spacing: .18em; text-transform: uppercase; outline: none;
  }
  .pillar-btn:active { transform: scale(.94); }
  .pillar-btn.done {
    background: var(--primary-dim); border-color: rgba(59,108,183,0.5); color: var(--primary);
  }
  .pillar-icon { font-size: 22px; line-height: 1; }
  .all-done { text-align: center; font-family: var(--mono); font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--primary); margin-top: 10px; }

  /* Goal */
  .goal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .goal-text { font-size: 14px; color: rgba(240,244,255,0.75); line-height: 1.6; cursor: pointer; }
  .goal-placeholder { font-size: 14px; color: var(--muted); font-style: italic; cursor: pointer; }
  .edit-btn {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    color: var(--muted); border-radius: 10px; padding: 4px 8px;
    font-size: 11px; cursor: pointer; font-family: var(--sans);
  }
  textarea {
    width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px; padding: 10px 12px; color: var(--text); font-size: 14px;
    font-family: var(--sans); resize: none; outline: none; line-height: 1.6;
  }
  textarea:focus { border-color: rgba(59,108,183,0.5); }
  .goal-actions { display: flex; gap: 8px; margin-top: 8px; }
  .save-btn {
    background: var(--primary); color: white; border: none;
    border-radius: 12px; padding: 8px 18px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .cancel-btn { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; padding: 8px; }

  /* Self-test */
  .test-header { display: flex; justify-content: space-between; align-items: center; }
  .show-btn { background: none; border: none; color: var(--primary); font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .18em; cursor: pointer; }
  .test-text { font-size: 13px; color: rgba(240,244,255,0.65); line-height: 1.7; margin-top: 10px; display: none; }
  .test-text.visible { display: block; }

  /* Progress grid */
  .grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .week-dot {
    width: 14px; height: 14px; border-radius: 3px;
    transition: background .2s;
  }
  .week-dot.future  { background: rgba(255,255,255,0.05); }
  .week-dot.current { background: var(--primary); box-shadow: 0 0 0 2px rgba(59,108,183,0.35); }
  .week-dot.full    { background: rgba(59,108,183,0.6); }
  .week-dot.partial { background: rgba(59,108,183,0.25); }
  .week-dot.missed  { background: rgba(255,255,255,0.07); }
  .legend { display: flex; gap: 14px; margin-top: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .15em; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* Roadmap */
  .roadmap-item { display: flex; gap: 12px; margin-bottom: 14px; }
  .roadmap-item:last-child { margin-bottom: 0; }
  .dot-col { display: flex; flex-direction: column; align-items: center; padding-top: 2px; }
  .rdot {
    width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.18);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  .rdot.past { background: rgba(59,108,183,0.4); border-color: rgba(59,108,183,0.6); }
  .rdot.active { background: var(--primary); border-color: var(--primary); }
  .rdot-inner { width: 6px; height: 6px; border-radius: 50%; background: white; }
  .check { font-size: 9px; color: white; }
  .rline { width: 1px; flex: 1; background: var(--border); margin-top: 4px; }
  .roadmap-item:last-child .rline { display: none; }
  .r-title { font-size: 14px; font-weight: 600; }
  .r-title.future { color: rgba(240,244,255,0.35); }
  .r-weeks { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .15em; color: var(--muted); margin-left: 8px; }
  .r-sub { font-size: 11px; color: var(--muted); line-height: 1.5; margin-top: 3px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo">R</div>
    <span class="header-label">Math Prep</span>
  </div>

  <!-- Week / Phase -->
  <div class="card">
    <span class="label" id="week-label">Week — / 43</span>
    <div class="week-row">
      <div style="flex:1;min-width:0">
        <div class="phase-name" id="phase-name">—</div>
        <div class="phase-sub" id="phase-sub"></div>
      </div>
      <div class="days-logged">
        <div class="days-num" id="days-logged">0</div>
        <div class="days-sub">Days logged</div>
      </div>
    </div>
  </div>

  <!-- Today's pillars -->
  <div class="card">
    <span class="label today-date" id="today-label">Today</span>
    <div class="pillars">
      <button class="pillar-btn" id="btn-anki" onclick="toggle('anki')">
        <span class="pillar-icon" id="icon-anki">🧠</span>
        <span>Anki</span>
      </button>
      <button class="pillar-btn" id="btn-read" onclick="toggle('read')">
        <span class="pillar-icon" id="icon-read">📖</span>
        <span>Read</span>
      </button>
      <button class="pillar-btn" id="btn-exercises" onclick="toggle('exercises')">
        <span class="pillar-icon" id="icon-exercises">✏️</span>
        <span>Work</span>
      </button>
    </div>
    <div class="all-done" id="all-done" style="display:none">All three done · Good work</div>
  </div>

  <!-- Weekly goal -->
  <div class="card">
    <div class="goal-header">
      <span class="label" style="margin:0">This week's goal</span>
      <button class="edit-btn" onclick="startEdit()">Edit</button>
    </div>
    <div id="goal-display" onclick="startEdit()"></div>
    <div id="goal-editor" style="display:none">
      <textarea id="goal-input" rows="3" placeholder="Set your goal for this week…"></textarea>
      <div class="goal-actions">
        <button class="save-btn" onclick="saveGoal()">Save</button>
        <button class="cancel-btn" onclick="cancelEdit()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Self-test -->
  <div class="card">
    <div class="test-header">
      <span class="label" style="margin:0">Phase self-test</span>
      <button class="show-btn" onclick="toggleTest(this)">Show</button>
    </div>
    <div class="test-text" id="self-test"></div>
  </div>

  <!-- Progress grid -->
  <div class="card">
    <span class="label">Army progress · 43 weeks</span>
    <div class="grid" id="week-grid"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:rgba(59,108,183,0.6)"></div>Complete</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(59,108,183,0.25)"></div>Partial</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.07)"></div>Missed</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.05)"></div>Ahead</div>
    </div>
  </div>

  <!-- Roadmap -->
  <div class="card">
    <span class="label">Roadmap</span>
    <div id="roadmap"></div>
  </div>

</div>

<script>
const ARMY_START = new Date('2026-06-29T00:00:00');
const TOTAL_WEEKS = 43;
const KEY = 'math_prep_v1';

const PHASES = [
  { weeks: [1,8],   name: 'Epsilon-Delta',           sub: 'Abbott Ch. 1–4 · Real number axioms, limits, continuity' },
  { weeks: [9,16],  name: 'Linear Algebra',           sub: 'Axler Ch. 1–3 · Vector spaces, linear maps, bases' },
  { weeks: [17,24], name: 'Sequences & Series',       sub: 'Abbott Ch. 2–3, 6 · Cauchy, Bolzano-Weierstrass' },
  { weeks: [25,32], name: 'Derivatives & Integration',sub: 'Abbott Ch. 5–7 · MVT, Riemann, FTA' },
  { weeks: [33,43], name: 'Problem-Solving Sprint',   sub: 'Past Unige exams · Timed, cold, no notes' },
];

const TESTS = [
  'Prove ε-δ: lim_{x→2}(3x+1) = 7. Also: if f is continuous and f(a) > 0, prove ∃δ > 0 s.t. f(x) > 0 on (a−δ, a+δ).',
  'State all 8 vector space axioms from memory. Prove the rank-nullity theorem.',
  'Prove Bolzano-Weierstrass. Show ℚ is dense in ℝ.',
  'State and prove the Fundamental Theorem of Analysis.',
  'Complete a past Unige year-1 exam — timed, blind, no notes.',
];

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || { days: {}, weeklyGoals: {} }; }
  catch { return { days: {}, weeklyGoals: {} }; }
}
function save(data) { localStorage.setItem(KEY, JSON.stringify(data)); }

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function weekNum() {
  const ms = new Date() - ARMY_START;
  if (ms < 0) return 0;
  return Math.min(Math.floor(ms / (7*24*60*60*1000)) + 1, TOTAL_WEEKS);
}

function isoWeekKey() {
  const d = new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - ((d.getDay()+6)%7));
  const w1 = new Date(d.getFullYear(), 0, 4);
  const wn = 1 + Math.round(((d-w1)/86400000 - 3 + ((w1.getDay()+6)%7))/7);
  return `${d.getFullYear()}-W${String(wn).padStart(2,'0')}`;
}

function currentPhase(wn) {
  for (let i = 0; i < PHASES.length; i++) {
    const [s,e] = PHASES[i].weeks;
    if (wn >= s && wn <= e) return { idx: i, ...PHASES[i] };
  }
  return wn < 1 ? { idx: 0, ...PHASES[0] } : { idx: PHASES.length-1, ...PHASES[PHASES.length-1] };
}

function weekStatus(wn, data) {
  if (wn <= 0) return 'future';
  const start = new Date(ARMY_START.getTime() + (wn-1)*7*24*60*60*1000);
  let total = 0, done = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(start.getTime() + i*24*60*60*1000);
    if (d > new Date()) break;
    total++;
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const day = data.days[k];
    if (day && (day.anki || day.read || day.exercises)) done++;
  }
  if (total === 0) return 'future';
  if (done === total) return 'full';
  if (done > 0) return 'partial';
  return 'missed';
}

function render() {
  const data = load();
  const wn = weekNum();
  const phase = currentPhase(wn);
  const tk = todayKey();
  const wk = isoWeekKey();
  const today = data.days[tk] || { anki: false, read: false, exercises: false };
  const goal = data.weeklyGoals[wk] || '';

  // Week / phase
  document.getElementById('week-label').textContent = wn > 0 ? `Week ${wn} / ${TOTAL_WEEKS}` : 'Starting soon';
  document.getElementById('phase-name').textContent = phase.name;
  document.getElementById('phase-sub').textContent = phase.sub;

  // Days logged
  const daysLogged = Object.keys(data.days).filter(k => {
    const d = data.days[k]; return d.anki || d.read || d.exercises;
  }).length;
  document.getElementById('days-logged').textContent = daysLogged;

  // Today label
  const d = new Date();
  document.getElementById('today-label').textContent =
    'Today · ' + d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });

  // Pillars
  ['anki','read','exercises'].forEach(f => {
    const btn = document.getElementById(`btn-${f}`);
    const icon = document.getElementById(`icon-${f}`);
    const done = today[f];
    btn.className = 'pillar-btn' + (done ? ' done' : '');
    const icons = { anki: done ? '✅' : '🧠', read: done ? '✅' : '📖', exercises: done ? '✅' : '✏️' };
    icon.textContent = icons[f];
  });
  const allDone = today.anki && today.read && today.exercises;
  document.getElementById('all-done').style.display = allDone ? 'block' : 'none';

  // Goal
  const display = document.getElementById('goal-display');
  display.innerHTML = goal
    ? `<div class="goal-text">${escHtml(goal)}</div>`
    : `<div class="goal-placeholder">Tap to set a goal for this week…</div>`;

  // Self-test
  document.getElementById('self-test').textContent = TESTS[phase.idx];

  // Grid
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';
  for (let w = 1; w <= TOTAL_WEEKS; w++) {
    const dot = document.createElement('div');
    const s = w > wn ? 'future' : w === wn ? 'current' : weekStatus(w, data);
    dot.className = `week-dot ${s}`;
    dot.title = `Week ${w}`;
    grid.appendChild(dot);
  }

  // Roadmap
  const rm = document.getElementById('roadmap');
  rm.innerHTML = '';
  PHASES.forEach((p, i) => {
    const isActive = phase.idx === i;
    const isPast = phase.idx > i;
    const div = document.createElement('div');
    div.className = 'roadmap-item';
    div.innerHTML = `
      <div class="dot-col">
        <div class="rdot ${isPast ? 'past' : isActive ? 'active' : ''}">
          ${isPast ? '<span class="check">✓</span>' : isActive ? '<div class="rdot-inner"></div>' : ''}
        </div>
        <div class="rline"></div>
      </div>
      <div style="flex:1;padding-top:1px">
        <div style="display:flex;align-items:baseline">
          <span class="r-title ${!isActive && !isPast ? 'future' : ''}">${p.name}</span>
          <span class="r-weeks">Wk ${p.weeks[0]}–${p.weeks[1]}</span>
        </div>
        ${isActive ? `<div class="r-sub">${p.sub}</div>` : ''}
      </div>`;
    rm.appendChild(div);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function toggle(field) {
  const data = load();
  const tk = todayKey();
  const today = data.days[tk] || { anki: false, read: false, exercises: false };
  data.days[tk] = { ...today, [field]: !today[field] };
  save(data);
  render();
}

function startEdit() {
  const data = load();
  const goal = data.weeklyGoals[isoWeekKey()] || '';
  document.getElementById('goal-input').value = goal;
  document.getElementById('goal-display').style.display = 'none';
  document.getElementById('goal-editor').style.display = 'block';
  document.querySelector('.edit-btn').style.display = 'none';
  document.getElementById('goal-input').focus();
}

function saveGoal() {
  const data = load();
  data.weeklyGoals[isoWeekKey()] = document.getElementById('goal-input').value.trim();
  save(data);
  cancelEdit();
  render();
}

function cancelEdit() {
  document.getElementById('goal-display').style.display = 'block';
  document.getElementById('goal-editor').style.display = 'none';
  document.querySelector('.edit-btn').style.display = 'block';
}

function toggleTest(btn) {
  const el = document.getElementById('self-test');
  const visible = el.classList.toggle('visible');
  btn.textContent = visible ? 'Hide' : 'Show';
}

render();
</script>
</body>
</html>
